services:
  - type: web
    name: syncdoc-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run prisma:generate --workspace backend && npm run build --workspace backend
    preDeployCommand: npm run prisma:deploy --workspace backend
    startCommand: npm run start --workspace backend
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend/**
        - package.json
        - package-lock.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PASSWORD_RESET_TOKEN_TTL_MINUTES
        value: 30
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
